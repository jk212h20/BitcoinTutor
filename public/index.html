<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Bitcoin Rabbit Hole</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #f7931a;
      --accent-dim: #f7931a33;
      --user-bg: #1a2332;
      --bot-bg: #161b22;
      --success: #3fb950;
      --tip-bg: #1a2a1a;
    }
    
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    
    body { display: flex; flex-direction: column; }
    
    /* Header */
    .header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    
    .header .logo {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .subtitle { font-size: 13px; color: var(--text-muted); margin-left: auto; }
    
    .login-indicator {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: none;
    }
    .login-indicator.active {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #1a2a1a;
      border-color: var(--success);
      color: var(--success);
    }
    
    .new-chat-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .new-chat-btn:hover { border-color: var(--accent); color: var(--accent); }
    
    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      max-width: 720px; width: 100%;
      margin: 0 auto;
      padding: 16px 20px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.bot { background: var(--bot-bg); border: 1px solid var(--border); }
    .message.user { background: var(--user-bg); border: 1px solid #1e3a5f; }
    .message.system {
      background: var(--tip-bg);
      border: 1px solid var(--success);
      text-align: center;
      font-size: 14px;
    }
    
    .message .sender {
      font-weight: 600; font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .message.bot .sender { color: var(--accent); }
    .message.user .sender { color: #58a6ff; }
    .message.system .sender { color: var(--success); }
    
    .message .content { white-space: pre-wrap; word-wrap: break-word; }
    .message .content p { margin-bottom: 8px; }
    .message .content p:last-child { margin-bottom: 0; }
    .message .content strong, .message .content b { color: var(--accent); }
    .message .content em, .message .content i { color: #79c0ff; }
    .message .content code {
      background: #0d1117; padding: 2px 6px;
      border-radius: 4px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
    }
    
    /* QR code container (for LNURL-auth) */
    .qr-container {
      max-width: 720px; width: 100%;
      margin: 0 auto;
      padding: 20px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--accent);
      text-align: center;
      animation: fadeIn 0.3s ease;
    }
    
    .qr-container h3 {
      color: var(--accent);
      margin-bottom: 12px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .qr-container img {
      border-radius: 8px;
      background: white;
      padding: 12px;
      max-width: 220px;
    }
    
    .qr-container .lnurl-text {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-all;
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .qr-container .lnurl-text:hover { background: var(--surface-hover); }
    
    .qr-container .qr-status {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .qr-container .qr-status.success { color: var(--success); }
    
    .qr-container .wallet-help {
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .qr-container .wallet-help a {
      color: var(--accent);
      text-decoration: none;
    }
    .qr-container .wallet-help a:hover { text-decoration: underline; }

    /* Loading */
    .loading {
      max-width: 720px; width: 100%;
      margin: 0 auto; padding: 16px 20px;
    }
    .loading .dots { display: flex; gap: 6px; }
    .loading .dot {
      width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }
    .loading .dot:nth-child(2) { animation-delay: 0.2s; }
    .loading .dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }
    
    /* Input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    
    .input-wrapper {
      max-width: 720px; margin: 0 auto;
      display: flex; gap: 10px;
    }
    
    .input-wrapper input {
      flex: 1; padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text); font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    .input-wrapper input:focus { border-color: var(--accent); }
    .input-wrapper input::placeholder { color: var(--text-muted); }
    
    .input-wrapper button {
      padding: 12px 24px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .input-wrapper button:hover { background: #e8851a; }
    .input-wrapper button:disabled { background: var(--border); cursor: not-allowed; }
    
    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    /* Model info bar */
    .model-info {
      padding: 4px 20px;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.5;
      text-align: right;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    
    @media (max-width: 600px) {
      .message { padding: 12px 14px; font-size: 14px; }
      .header .subtitle { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="logo" src="/favicon.png" alt="Bitcoin Rabbit Hole">
    <h1>Bitcoin Rabbit Hole</h1>
    <span class="login-indicator" id="loginIndicator">⚡ Logged in</span>
    <a href="/admin" id="adminLink" style="display:none;font-size:12px;padding:4px 10px;border-radius:12px;background:#1a1a2e;border:1px solid var(--accent);color:var(--accent);text-decoration:none;">Admin</a>
    <span class="subtitle">How deep do you want to go?</span>
    <button class="new-chat-btn" onclick="startNewChat()">New Chat</button>
  </div>
  <div class="model-info" id="modelInfo"></div>
  
  <div class="messages" id="messages"></div>
  
  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="Type your answer or ask a question..." autocomplete="off" disabled />
      <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>
  </div>

  <script>
    // === State ===
    let sessionId = null;
    let isLoading = false;
    let isLoggedIn = false;
    let authPollingInterval = null;
    
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loginIndicator = document.getElementById('loginIndicator');
    const modelInfoEl = document.getElementById('modelInfo');
    
    function updateModelInfo(data) {
      if (!data) return;
      const model = data.model || '';
      const costSats = data.costSats || 0;
      const fmt = costSats >= 1 ? costSats.toFixed(1) + ' sats' : costSats > 0 ? '<1 sat' : '';
      modelInfoEl.textContent = fmt ? `${model} · ⚡${fmt} API cost` : model;
    }
    
    // === Visitor ID (localStorage fingerprint) ===
    function getVisitorId() {
      let id = localStorage.getItem('btc-tutor-visitor');
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem('btc-tutor-visitor', id);
      }
      return id;
    }
    
    // === Message formatting ===
    function formatMessage(text) {
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/\n\n/g, '</p><p>');
      text = text.replace(/\n/g, '<br>');
      return '<p>' + text + '</p>';
    }
    
    function addMessage(content, sender) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      const senderLabel = sender === 'bot' ? '🐇 Bitcoin Rabbit' : sender === 'system' ? '⚡ System' : 'You';
      msg.innerHTML = `
        <div class="sender">${senderLabel}</div>
        <div class="content">${formatMessage(content)}</div>
      `;
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    function showLoading() {
      const loading = document.createElement('div');
      loading.className = 'loading';
      loading.id = 'loading';
      loading.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      messagesEl.appendChild(loading);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    function hideLoading() {
      const el = document.getElementById('loading');
      if (el) el.remove();
    }
    
    function setInputEnabled(enabled) {
      inputEl.disabled = !enabled;
      sendBtn.disabled = !enabled;
      if (enabled) inputEl.focus();
    }
    
    // === Handle special actions from the server ===
    function handleActions(actions) {
      if (!actions) return;
      for (const action of actions) {
        if (action.type === 'show_login') {
          showLoginQR();
        } else if (action.type === 'tip') {
          if (action.paid) {
            addMessage(`⚡ ${action.amount} sats sent directly to your wallet! "${action.reason}"`, 'system');
          } else {
            addMessage(`⚡ You earned ${action.amount} sats! "${action.reason}" — claim them with the button above.`, 'system');
          }
          checkBalance();
        } else if (action.type === 'donation') {
          showDonationQR(action);
        }
      }
    }
    
    // === LNURL-auth QR display ===
    async function showLoginQR() {
      if (!sessionId) return;
      
      try {
        const res = await fetch('/api/auth/challenge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        
        // Create QR container
        const qrDiv = document.createElement('div');
        qrDiv.className = 'qr-container';
        qrDiv.id = 'loginQR';
        
        // Use a QR code API for the image
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent('lightning:' + data.lnurl)}`;
        
        qrDiv.innerHTML = `
          <h3>⚡ Log in with Lightning</h3>
          <img src="${qrUrl}" alt="LNURL-auth QR code" />
          <div class="lnurl-text" onclick="copyLnurl('${data.lnurl}')" title="Click to copy">
            ${data.lnurl.slice(0, 40)}...
          </div>
          <div class="qr-status" id="qrStatus">Waiting for wallet scan...</div>
          <div class="wallet-help">
            Don't have a Lightning wallet? Try <a href="https://phoenix.acinq.co/" target="_blank">Phoenix Wallet</a>
          </div>
        `;
        
        messagesEl.appendChild(qrDiv);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        
        // Start polling for auth result
        startAuthPolling(data.k1);
        
      } catch (err) {
        console.error('Login QR error:', err);
        addMessage('Had trouble generating the login code. Try again in a moment.', 'system');
      }
    }
    
    function copyLnurl(lnurl) {
      navigator.clipboard.writeText(lnurl).then(() => {
        const el = document.querySelector('.lnurl-text');
        if (el) {
          const original = el.textContent;
          el.textContent = 'Copied!';
          setTimeout(() => { el.textContent = original; }, 2000);
        }
      });
    }
    
    function startAuthPolling(k1) {
      if (authPollingInterval) clearInterval(authPollingInterval);
      
      let attempts = 0;
      let authHandled = false; // Guard against multiple async callbacks
      authPollingInterval = setInterval(async () => {
        if (authHandled) return; // Already handled, skip
        attempts++;
        if (attempts > 150) {
          clearInterval(authPollingInterval);
          const statusEl = document.getElementById('qrStatus');
          if (statusEl) statusEl.textContent = 'Login expired. Send a message to try again.';
          return;
        }
        
        try {
          const res = await fetch(`/api/auth/status/${k1}`);
          const data = await res.json();
          
          if (data.status === 'authenticated' && !authHandled) {
            authHandled = true; // Set IMMEDIATELY before any async work
            clearInterval(authPollingInterval);
            isLoggedIn = true;
            
            // Update UI
            loginIndicator.classList.add('active');
            const statusEl = document.getElementById('qrStatus');
            if (statusEl) {
              statusEl.textContent = '✅ Logged in successfully!';
              statusEl.className = 'qr-status success';
            }
            
            // Remove QR after a moment
            setTimeout(() => {
              const qr = document.getElementById('loginQR');
              if (qr) qr.remove();
            }, 2000);
            
            // Notify the tutor about the login (only once!)
            showLoading();
            const notifyRes = await fetch('/api/auth/notify', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sessionId, isNewUser: data.isNewUser }),
            });
            const notifyData = await notifyRes.json();
            hideLoading();
            
            if (notifyData.message) {
              addMessage(notifyData.message, 'bot');
              handleActions(notifyData.actions);
            }
            
            // Check if admin
            checkAdminStatus();
          }
        } catch (err) {
          // Silently retry
        }
      }, 2000);
    }
    
    // === Admin check ===
    async function checkAdminStatus() {
      if (!sessionId) return;
      try {
        const res = await fetch(`/api/admin/check?sessionId=${sessionId}`);
        const data = await res.json();
        if (data.isAdmin) {
          document.getElementById('adminLink').style.display = 'inline-block';
        }
      } catch (e) { /* silent */ }
    }
    
    // === Balance & Claim ===
    let satBalance = 0;
    
    async function checkBalance() {
      if (!sessionId || !isLoggedIn) return;
      try {
        const res = await fetch(`/api/balance/${sessionId}`);
        const data = await res.json();
        satBalance = data.balance || 0;
        updateBalanceUI();
      } catch (e) { /* silent */ }
    }
    
    function updateBalanceUI() {
      const existing = document.getElementById('balanceIndicator');
      if (satBalance > 0 && isLoggedIn) {
        if (!existing) {
          const el = document.createElement('span');
          el.id = 'balanceIndicator';
          el.style.cssText = 'font-size:12px;padding:4px 10px;border-radius:12px;background:#2a1a00;border:1px solid var(--accent);color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-left:8px;';
          el.onclick = claimSats;
          loginIndicator.insertAdjacentElement('afterend', el);
        }
        const el = document.getElementById('balanceIndicator');
        el.textContent = `⚡ ${satBalance} sats — Claim`;
      } else if (existing) {
        existing.remove();
      }
    }
    
    async function claimSats() {
      if (!sessionId || !isLoggedIn || satBalance <= 0) return;
      
      try {
        const res = await fetch('/api/claim/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId }),
        });
        const data = await res.json();
        if (data.error) {
          addMessage(`Could not create withdraw: ${data.error}`, 'system');
          return;
        }
        
        // Show LNURL-withdraw QR
        const qrDiv = document.createElement('div');
        qrDiv.className = 'qr-container';
        qrDiv.id = 'claimQR';
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent('lightning:' + data.lnurl)}`;
        
        qrDiv.innerHTML = `
          <h3>⚡ Claim ${data.amount} sats</h3>
          <img src="${qrUrl}" alt="LNURL-withdraw QR" />
          <div class="lnurl-text" onclick="navigator.clipboard.writeText('${data.lnurl}').then(()=>{this.textContent='Copied!'})" title="Click to copy">
            ${data.lnurl.slice(0, 40)}...
          </div>
          <div class="qr-status" id="claimStatus">Scan with your Lightning wallet to receive sats...</div>
          <div class="wallet-help">
            <a href="${data.deepLink}">Open in wallet app</a>
          </div>
        `;
        
        messagesEl.appendChild(qrDiv);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        
        // Poll claim status
        let claimAttempts = 0;
        const claimPoll = setInterval(async () => {
          claimAttempts++;
          if (claimAttempts > 150) {
            clearInterval(claimPoll);
            const el = document.getElementById('claimStatus');
            if (el) el.textContent = 'Withdraw expired.';
            return;
          }
          try {
            const sr = await fetch(`/api/claim/status/${data.k1}`);
            const sd = await sr.json();
            const el = document.getElementById('claimStatus');
            if (sd.status === 'complete') {
              clearInterval(claimPoll);
              if (el) { el.textContent = `✅ ${data.amount} sats sent to your wallet!`; el.className = 'qr-status success'; }
              satBalance = 0;
              updateBalanceUI();
              setTimeout(() => { const qr = document.getElementById('claimQR'); if (qr) qr.remove(); }, 3000);
            } else if (sd.status === 'failed') {
              clearInterval(claimPoll);
              if (el) el.textContent = `❌ Payment failed: ${sd.error}`;
            }
          } catch (e) { /* retry */ }
        }, 2000);
        
      } catch (err) {
        console.error('Claim error:', err);
        addMessage('Failed to create withdraw. Try again.', 'system');
      }
    }
    
    // === Donation QR ===
    function showDonationQR(action) {
      const qrDiv = document.createElement('div');
      qrDiv.className = 'qr-container';
      const qrId = 'donationQR_' + Date.now();
      qrDiv.id = qrId;
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent('lightning:' + action.paymentRequest)}`;
      
      qrDiv.innerHTML = `
        <h3>🎁 Donate ${action.amount} sats</h3>
        <p style="color:var(--text-muted);font-size:13px;margin-bottom:12px;">${action.memo}</p>
        <img src="${qrUrl}" alt="Lightning Invoice QR" />
        <div class="lnurl-text" onclick="navigator.clipboard.writeText('${action.paymentRequest}').then(()=>{this.textContent='Copied!'})" title="Click to copy invoice">
          ${action.paymentRequest.slice(0, 40)}...
        </div>
        <div class="qr-status" id="${qrId}_status">Waiting for payment...</div>
        <div class="wallet-help">
          <a href="lightning:${action.paymentRequest}">Open in wallet app</a>
        </div>
      `;
      
      messagesEl.appendChild(qrDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      
      // Poll for payment
      let donationAttempts = 0;
      const donationPoll = setInterval(async () => {
        donationAttempts++;
        if (donationAttempts > 1800) { // 1 hour at 2s intervals
          clearInterval(donationPoll);
          const el = document.getElementById(qrId + '_status');
          if (el) el.textContent = 'Invoice expired.';
          return;
        }
        try {
          const sr = await fetch(`/api/donation/status/${action.rHash}`);
          const sd = await sr.json();
          if (sd.settled) {
            clearInterval(donationPoll);
            const el = document.getElementById(qrId + '_status');
            if (el) { el.textContent = `✅ Thank you! ${sd.amtPaidSat} sats received!`; el.className = 'qr-status success'; }
            setTimeout(() => { const qr = document.getElementById(qrId); if (qr) qr.remove(); }, 5000);
          }
        } catch (e) { /* retry */ }
      }, 2000);
    }
    
    // === Chat functions ===
    async function startNewChat() {
      messagesEl.innerHTML = '';
      sessionId = null;
      isLoggedIn = false;
      loginIndicator.classList.remove('active');
      if (authPollingInterval) clearInterval(authPollingInterval);
      setInputEnabled(false);
      showLoading();
      
      try {
        const res = await fetch('/api/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ visitorId: getVisitorId() }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        
        sessionId = data.sessionId;
        localStorage.setItem('btc-tutor-session', sessionId);
        hideLoading();
        addMessage(data.message, 'bot');
        handleActions(data.actions);
        updateModelInfo(data);
        setInputEnabled(true);
      } catch (err) {
        hideLoading();
        addMessage('Sorry, I had trouble starting up. Please try again.', 'bot');
        setInputEnabled(true);
        console.error('Start error:', err);
      }
    }
    
    // Collect conversation history from DOM for session recovery
    function getConversationHistory() {
      const messages = [];
      const msgEls = messagesEl.querySelectorAll('.message.user, .message.bot');
      for (const el of msgEls) {
        const contentEl = el.querySelector('.content');
        if (!contentEl) continue;
        const role = el.classList.contains('user') ? 'user' : 'assistant';
        // Get text content, strip HTML formatting
        const text = contentEl.textContent.trim();
        if (text) messages.push({ role, content: text });
      }
      return messages;
    }
    
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;
      
      if (!sessionId) {
        console.warn('No session yet, waiting...');
        return;
      }
      
      isLoading = true;
      addMessage(text, 'user');
      inputEl.value = '';
      setInputEnabled(false);
      showLoading();
      
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 60000); // 60s timeout
        
        // Always include conversation history — server uses it to reconstruct lost sessions
        const history = getConversationHistory();
        
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: text, history }),
          signal: controller.signal,
        });
        clearTimeout(timeout);
        
        const data = await res.json();
        
        if (data.error) {
          throw new Error(data.error);
        }
        
        hideLoading();
        addMessage(data.message, 'bot');
        handleActions(data.actions);
        updateModelInfo(data);
        
        if (data.isLoggedIn && !isLoggedIn) {
          isLoggedIn = true;
          loginIndicator.classList.add('active');
        }
      } catch (err) {
        hideLoading();
        if (err.name === 'AbortError') {
          addMessage('That took too long — the tutor might be thinking hard! Try again.', 'bot');
        } else {
          addMessage('Sorry, something went wrong. Try sending again.', 'bot');
        }
        console.error('Chat error:', err);
      }
      
      isLoading = false;
      setInputEnabled(true);
    }
    
    // Enter to send
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    // Start on load
    startNewChat();
  </script>
</body>
</html>
