<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin Quiz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #f7931a;
      --accent-dim: #f7931a33;
      --user-bg: #1a2332;
      --bot-bg: #161b22;
    }
    
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    
    body {
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    
    .header .logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: #fff;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }
    
    .header .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
    }
    
    .new-quiz-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .new-quiz-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 20px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
    }
    
    .message.user {
      background: var(--user-bg);
      border: 1px solid #1e3a5f;
    }
    
    .message.bot .sender {
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .message.user .sender {
      color: #58a6ff;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .message .content {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .message .content p { margin-bottom: 8px; }
    .message .content p:last-child { margin-bottom: 0; }
    .message .content strong, .message .content b { color: var(--accent); }
    .message .content em, .message .content i { color: #79c0ff; }
    .message .content code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }
    
    /* Loading indicator */
    .loading {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 20px;
    }
    
    .loading .dots {
      display: flex;
      gap: 6px;
    }
    
    .loading .dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }
    
    .loading .dot:nth-child(2) { animation-delay: 0.2s; }
    .loading .dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }
    
    /* Input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    
    .input-wrapper {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }
    
    .input-wrapper input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .input-wrapper input:focus {
      border-color: var(--accent);
    }
    
    .input-wrapper input::placeholder {
      color: var(--text-muted);
    }
    
    .input-wrapper button {
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .input-wrapper button:hover {
      background: #e8851a;
    }
    
    .input-wrapper button:disabled {
      background: var(--border);
      cursor: not-allowed;
    }
    
    /* Scrollbar */
    .messages::-webkit-scrollbar {
      width: 6px;
    }
    .messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .message { padding: 12px 14px; font-size: 14px; }
      .header .subtitle { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">₿</div>
    <h1>Bitcoin Quiz</h1>
    <span class="subtitle">Adaptive Socratic tutor · 157 topics</span>
    <button class="new-quiz-btn" onclick="startNewQuiz()">New Quiz</button>
  </div>
  
  <div class="messages" id="messages">
    <!-- Messages will be added here -->
  </div>
  
  <div class="input-area">
    <div class="input-wrapper">
      <input 
        type="text" 
        id="userInput" 
        placeholder="Type your answer or ask a question..." 
        autocomplete="off"
        disabled
      />
      <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>
  </div>

  <script>
    let sessionId = null;
    let isLoading = false;
    
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    
    // Simple markdown-like formatting
    function formatMessage(text) {
      // Convert **bold**
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Convert *italic*
      text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
      // Convert `code`
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Convert newlines to <br> (but keep paragraph breaks)
      text = text.replace(/\n\n/g, '</p><p>');
      text = text.replace(/\n/g, '<br>');
      return '<p>' + text + '</p>';
    }
    
    function addMessage(content, sender) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      msg.innerHTML = `
        <div class="sender">${sender === 'bot' ? '₿ Tutor' : 'You'}</div>
        <div class="content">${formatMessage(content)}</div>
      `;
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    function showLoading() {
      const loading = document.createElement('div');
      loading.className = 'loading';
      loading.id = 'loading';
      loading.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      messagesEl.appendChild(loading);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    function hideLoading() {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    }
    
    function setInputEnabled(enabled) {
      inputEl.disabled = !enabled;
      sendBtn.disabled = !enabled;
      if (enabled) inputEl.focus();
    }
    
    async function startNewQuiz() {
      messagesEl.innerHTML = '';
      sessionId = null;
      setInputEnabled(false);
      showLoading();
      
      try {
        const res = await fetch('/api/start', { method: 'POST' });
        const data = await res.json();
        
        if (data.error) throw new Error(data.error);
        
        sessionId = data.sessionId;
        hideLoading();
        addMessage(data.message, 'bot');
        setInputEnabled(true);
      } catch (err) {
        hideLoading();
        addMessage('Sorry, I had trouble starting up. Please try again.', 'bot');
        setInputEnabled(true);
        console.error('Start error:', err);
      }
    }
    
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading || !sessionId) return;
      
      isLoading = true;
      addMessage(text, 'user');
      inputEl.value = '';
      setInputEnabled(false);
      showLoading();
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: text }),
        });
        
        const data = await res.json();
        
        if (data.error) {
          if (res.status === 404) {
            // Session expired
            addMessage("It looks like your session expired. Let me start a new quiz for you!", 'bot');
            hideLoading();
            isLoading = false;
            await startNewQuiz();
            return;
          }
          throw new Error(data.error);
        }
        
        hideLoading();
        addMessage(data.message, 'bot');
      } catch (err) {
        hideLoading();
        addMessage('Sorry, something went wrong. Try sending your message again.', 'bot');
        console.error('Chat error:', err);
      }
      
      isLoading = false;
      setInputEnabled(true);
    }
    
    // Enter key to send
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    // Start quiz on page load
    startNewQuiz();
  </script>
</body>
</html>
